<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="450" viewBox="0 0 1200 450"><rect width="1200" height="450" fill="#f8fafc"/><text x="600" y="46" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#0f172a">从用户原话到需求候选：证据链不能断</text><g font-family="Arial" text-anchor="middle"><g transform="translate(35 120)"><rect width="185" height="120" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="92" y="43" font-size="21" font-weight="700" fill="#1e3a8a">1 原始反馈</text><text x="92" y="78" font-size="16" fill="#334155">原话、来源、日期</text><text x="92" y="102" font-size="16" fill="#334155">匿名用户 ID</text></g><g transform="translate(270 120)"><rect width="185" height="120" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="92" y="43" font-size="21" font-weight="700" fill="#5b21b6">2 标准化</text><text x="92" y="78" font-size="16" fill="#334155">目标、场景、问题</text><text x="92" y="102" font-size="16" fill="#334155">影响与绕过方式</text></g><g transform="translate(505 120)"><rect width="185" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="92" y="43" font-size="21" font-weight="700" fill="#166534">3 问题主题</text><text x="92" y="78" font-size="16" fill="#334155">独立用户数</text><text x="92" y="102" font-size="16" fill="#334155">原话与反例</text></g><g transform="translate(740 120)"><rect width="185" height="120" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="92" y="43" font-size="21" font-weight="700" fill="#92400e">4 需求候选</text><text x="92" y="78" font-size="16" fill="#334155">期望结果与非目标</text><text x="92" y="102" font-size="16" fill="#334155">风险与假设</text></g><g transform="translate(975 120)"><rect width="185" height="120" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="92" y="43" font-size="21" font-weight="700" fill="#991b1b">5 人工评审</text><text x="92" y="78" font-size="16" fill="#334155">优先级与方案</text><text x="92" y="102" font-size="16" fill="#334155">负责人决定</text></g></g><g stroke="#64748b" stroke-width="4"><line x1="220" y1="180" x2="270" y2="180"/><line x1="455" y1="180" x2="505" y2="180"/><line x1="690" y1="180" x2="740" y2="180"/><line x1="925" y1="180" x2="975" y2="180"/></g><rect x="150" y="305" width="900" height="82" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="600" y="338" text-anchor="middle" font-size="19" font-family="Arial" font-weight="700" fill="#0f172a">每个需求候选都必须保留 feedback_id 和代表性原话</text><text x="600" y="366" text-anchor="middle" font-size="17" font-family="Arial" fill="#475569">用户提出的功能只是方案之一，先还原背后的任务和问题</text></svg>