<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440"><rect width="1200" height="440" fill="#f8fafc"/><text x="600" y="46" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#0f172a">公众号文章：研究、写作、排版、审核分开做</text><g font-family="Arial" text-anchor="middle"><g transform="translate(30 115)"><rect width="170" height="120" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="85" y="43" font-size="21" font-weight="700" fill="#1e3a8a">1 事实卡片</text><text x="85" y="78" font-size="16" fill="#334155">资料、来源、日期</text><text x="85" y="102" font-size="16" fill="#334155">先核对不写作</text></g><g transform="translate(230 115)"><rect width="170" height="120" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="85" y="43" font-size="21" font-weight="700" fill="#5b21b6">2 选题大纲</text><text x="85" y="78" font-size="16" fill="#334155">读者、问题、收益</text><text x="85" y="102" font-size="16" fill="#334155">确认后再写</text></g><g transform="translate(430 115)"><rect width="170" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="85" y="43" font-size="21" font-weight="700" fill="#166534">3 正文初稿</text><text x="85" y="78" font-size="16" fill="#334155">步骤与成功标志</text><text x="85" y="102" font-size="16" fill="#334155">不虚构案例</text></g><g transform="translate(630 115)"><rect width="170" height="120" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="85" y="43" font-size="21" font-weight="700" fill="#92400e">4 事实审核</text><text x="85" y="78" font-size="16" fill="#334155">数据、版权、风险</text><text x="85" y="102" font-size="16" fill="#334155">争议先列问题</text></g><g transform="translate(830 115)"><rect width="170" height="120" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="85" y="43" font-size="21" font-weight="700" fill="#075985">5 排版草稿</text><text x="85" y="78" font-size="16" fill="#334155">Markdown + HTML</text><text x="85" y="102" font-size="16" fill="#334155">图片位置明确</text></g><g transform="translate(1030 115)"><rect width="140" height="120" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="70" y="43" font-size="21" font-weight="700" fill="#991b1b">6 人工发布</text><text x="70" y="78" font-size="16" fill="#334155">后台预览</text><text x="70" y="102" font-size="16" fill="#334155">最终确认</text></g></g><g stroke="#64748b" stroke-width="4"><line x1="200" y1="175" x2="230" y2="175"/><line x1="400" y1="175" x2="430" y2="175"/><line x1="600" y1="175" x2="630" y2="175"/><line x1="800" y1="175" x2="830" y2="175"/><line x1="1000" y1="175" x2="1030" y2="175"/></g><rect x="130" y="300" width="940" height="78" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="600" y="332" text-anchor="middle" font-size="19" font-family="Arial" font-weight="700" fill="#0f172a">WorkBuddy 负责机械劳动，人负责真实性、观点和发布</text><text x="600" y="360" text-anchor="middle" font-size="17" font-family="Arial" fill="#475569">不登录后台、不自动上传、不自动群发</text></svg>