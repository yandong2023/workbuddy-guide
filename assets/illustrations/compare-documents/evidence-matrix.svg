<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="45" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">差异矩阵必须保留原始证据</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="90" width="1060" height="350" rx="16" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <rect x="70" y="90" width="1060" height="62" rx="16" fill="#e2e8f0"/>
    <g font-size="17" font-weight="700" fill="#0f172a" text-anchor="middle">
      <text x="160" y="128">维度</text><text x="335" y="128">版本 A</text><text x="510" y="128">版本 B</text><text x="685" y="128">差异类型</text><text x="850" y="128">原始位置</text><text x="1030" y="128">处理状态</text>
    </g>
    <g stroke="#cbd5e1"><line x1="245" y1="90" x2="245" y2="440"/><line x1="420" y1="90" x2="420" y2="440"/><line x1="600" y1="90" x2="600" y2="440"/><line x1="770" y1="90" x2="770" y2="440"/><line x1="940" y1="90" x2="940" y2="440"/><line x1="70" y1="152" x2="1130" y2="152"/><line x1="70" y1="245" x2="1130" y2="245"/><line x1="70" y1="338" x2="1130" y2="338"/></g>
    <g font-size="16" fill="#334155" text-anchor="middle">
      <text x="160" y="195">付款期限</text><text x="335" y="185">签约后 30 天</text><text x="510" y="185">签约后 15 天</text><text x="685" y="195" fill="#b45309" font-weight="700">数字变化</text><text x="850" y="185">A §4.2</text><text x="850" y="210">B §4.2</text><text x="1030" y="195" fill="#dc2626" font-weight="700">待法务确认</text>
      <text x="160" y="288">验收附件</text><text x="335" y="278">包含附件 3</text><text x="510" y="278">未提及</text><text x="685" y="288" fill="#dc2626" font-weight="700">删除</text><text x="850" y="278">A 第 12 页</text><text x="850" y="303">B 无匹配</text><text x="1030" y="288" fill="#b45309" font-weight="700">需要确认</text>
      <text x="160" y="381">售后范围</text><text x="335" y="371">全部客户</text><text x="510" y="371">付费客户</text><text x="685" y="381" fill="#7c3aed" font-weight="700">范围变化</text><text x="850" y="371">A §7</text><text x="850" y="396">B §8</text><text x="1030" y="381" fill="#16a34a" font-weight="700">已确认</text>
    </g>
  </g>
  <text x="600" y="485" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#475569">AI 可以发现差异，但“哪个版本正确”必须由负责人确认</text>
</svg>