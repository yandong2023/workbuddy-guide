<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430"><rect width="1200" height="430" fill="#f8fafc"/><text x="600" y="46" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#0f172a">多份 Excel 安全合并流程</text><g font-family="Arial" text-anchor="middle"><g transform="translate(45 115)"><rect width="180" height="118" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="90" y="43" font-size="21" font-weight="700" fill="#1e3a8a">1 清点文件</text><text x="90" y="77" font-size="16" fill="#334155">文件数、工作表</text><text x="90" y="101" font-size="16" fill="#334155">字段与数据类型</text></g><g transform="translate(275 115)"><rect width="180" height="118" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="90" y="43" font-size="21" font-weight="700" fill="#5b21b6">2 字段映射</text><text x="90" y="77" font-size="16" fill="#334155">统一列名与类型</text><text x="90" y="101" font-size="16" fill="#334155">含义不明先确认</text></g><g transform="translate(505 115)"><rect width="180" height="118" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="90" y="43" font-size="21" font-weight="700" fill="#166534">3 小样合并</text><text x="90" y="77" font-size="16" fill="#334155">3 个代表文件</text><text x="90" y="101" font-size="16" fill="#334155">先验格式与行数</text></g><g transform="translate(735 115)"><rect width="180" height="118" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="90" y="43" font-size="21" font-weight="700" fill="#92400e">4 全量处理</text><text x="90" y="77" font-size="16" fill="#334155">保留来源列</text><text x="90" y="101" font-size="16" fill="#334155">异常单独输出</text></g><g transform="translate(965 115)"><rect width="180" height="118" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="90" y="43" font-size="21" font-weight="700" fill="#075985">5 汇总验收</text><text x="90" y="77" font-size="16" fill="#334155">对账与抽样复算</text><text x="90" y="101" font-size="16" fill="#334155">再做图表报告</text></g></g><g stroke="#64748b" stroke-width="4"><line x1="225" y1="174" x2="275" y2="174"/><line x1="455" y1="174" x2="505" y2="174"/><line x1="685" y1="174" x2="735" y2="174"/><line x1="915" y1="174" x2="965" y2="174"/></g><g fill="#64748b"><polygon points="268,168 280,174 268,180"/><polygon points="498,168 510,174 498,180"/><polygon points="728,168 740,174 728,180"/><polygon points="958,168 970,174 958,180"/></g><rect x="120" y="290" width="960" height="80" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="600" y="323" text-anchor="middle" font-size="19" font-family="Arial" font-weight="700" fill="#0f172a">禁止直接“一把梭”</text><text x="600" y="351" text-anchor="middle" font-size="17" font-family="Arial" fill="#475569">字段未确认、重复规则未确认、样本未通过时，不进入全量合并</text></svg>