  - collect_existing_sources_before_writing
  - collect_metadata_not_full_text
  - respect_robots_and_platform_terms
  - cite_original_source
  - third_party_requires_rewrite_and_fact_check
  - conflicting_information_requires_human_review
  - search_snippets_are_discovery_only
  - prices_models_credits_and_limits_are_time_sensitive

