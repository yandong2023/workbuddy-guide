<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><rect width="1200" height="520" fill="#f8fafc"/><text x="600" y="45" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#0f172a">竞品调研来源漏斗</text><g font-family="Arial" text-anchor="middle"><polygon points="130,90 1070,90 960,165 240,165" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="600" y="132" font-size="22" font-weight="700" fill="#1e3a8a">1 官方一手资料</text><text x="600" y="157" font-size="16" fill="#334155">官网、价格页、帮助中心、更新日志</text><polygon points="240,180 960,180 860,255 340,255" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="600" y="222" font-size="22" font-weight="700" fill="#166534">2 可验证演示</text><text x="600" y="247" font-size="16" fill="#334155">官方视频、公开试用、产品截图</text><polygon points="340,270 860,270 780,345 420,345" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="600" y="312" font-size="22" font-weight="700" fill="#92400e">3 可靠第三方</text><text x="600" y="337" font-size="16" fill="#334155">专业媒体、评测、公开访谈</text><polygon points="420,360 780,360 710,430 490,430" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="600" y="399" font-size="22" font-weight="700" fill="#991b1b">4 用户反馈</text><text x="600" y="423" font-size="16" fill="#334155">社区、应用商店、社交平台</text></g><text x="600" y="478" text-anchor="middle" font-size="18" font-family="Arial" fill="#475569">搜索摘要只用于发现线索，不能直接进入事实表</text></svg>