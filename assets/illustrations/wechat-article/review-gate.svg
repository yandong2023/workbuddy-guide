<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><rect width="1200" height="520" fill="#f8fafc"/><text x="600" y="45" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#0f172a">公众号发布前的六道审核闸门</text><g font-family="Arial" text-anchor="middle"><g transform="translate(80 100)"><rect width="300" height="105" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="150" y="40" font-size="21" font-weight="700" fill="#1e3a8a">事实与数据</text><text x="150" y="72" font-size="16" fill="#334155">数字、功能、价格是否有来源</text></g><g transform="translate(450 100)"><rect width="300" height="105" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="150" y="40" font-size="21" font-weight="700" fill="#5b21b6">观点与推断</text><text x="150" y="72" font-size="16" fill="#334155">推断是否被写成确定事实</text></g><g transform="translate(820 100)"><rect width="300" height="105" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="150" y="40" font-size="21" font-weight="700" fill="#166534">案例与效果</text><text x="150" y="72" font-size="16" fill="#334155">是否虚构用户、收入和节省时间</text></g><g transform="translate(80 245)"><rect width="300" height="105" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="150" y="40" font-size="21" font-weight="700" fill="#92400e">版权与引用</text><text x="150" y="72" font-size="16" fill="#334155">图片、文字、字体是否可使用</text></g><g transform="translate(450 245)"><rect width="300" height="105" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="150" y="40" font-size="21" font-weight="700" fill="#991b1b">隐私与敏感信息</text><text x="150" y="72" font-size="16" fill="#334155">账号、客户、路径和业务数据</text></g><g transform="translate(820 245)"><rect width="300" height="105" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="150" y="40" font-size="21" font-weight="700" fill="#075985">平台与发布</text><text x="150" y="72" font-size="16" fill="#334155">标题、排版、链接、人工确认</text></g></g><rect x="250" y="405" width="700" height="65" rx="16" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="600" y="445" text-anchor="middle" font-size="21" font-family="Arial" font-weight="700" fill="#0f172a">六项全部通过后，才进入公众号后台预览</text></svg>