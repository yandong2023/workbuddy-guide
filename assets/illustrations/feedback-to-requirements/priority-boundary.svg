<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><rect width="1200" height="520" fill="#f8fafc"/><text x="600" y="45" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#0f172a">需求优先级：AI 整理依据，人负责取舍</text><g font-family="Arial"><rect x="70" y="95" width="480" height="330" rx="22" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="310" y="140" text-anchor="middle" font-size="24" font-weight="700" fill="#155e75">WorkBuddy 可以做</text><g font-size="18" fill="#334155"><text x="120" y="190">✓ 统计独立用户数量和反馈频次</text><text x="120" y="235">✓ 汇总业务影响、绕过方式和风险</text><text x="120" y="280">✓ 保留原话、反例和证据强度</text><text x="120" y="325">✓ 整理成本、依赖和待验证假设</text><text x="120" y="370">✓ 生成多个优先级方案供评审</text></g><rect x="650" y="95" width="480" height="330" rx="22" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/><text x="890" y="140" text-anchor="middle" font-size="24" font-weight="700" fill="#9a3412">负责人必须决定</text><g font-size="18" fill="#334155"><text x="700" y="190">• 战略是否匹配</text><text x="700" y="235">• 是否投入资源</text><text x="700" y="280">• 选择哪个解决方案</text><text x="700" y="325">• 最终优先级和排期</text><text x="700" y="370">• 是否对客户承诺</text></g></g><path d="M550 260h100" stroke="#64748b" stroke-width="4"/><polygon points="640,252 658,260 640,268" fill="#64748b"/><text x="600" y="245" text-anchor="middle" font-size="17" font-family="Arial" fill="#475569">评审材料</text><rect x="250" y="460" width="700" height="38" rx="10" fill="#fee2e2" stroke="#ef4444"/><text x="600" y="486" text-anchor="middle" font-size="17" font-family="Arial" fill="#991b1b" font-weight="700">AI 不得自动承诺功能、回复客户或写入正式路线图</text></svg>