version: 2

verification_levels:
  tested:
    label: "A：已实测"
    requirements:
      - verified_at
      - tested_platform
      - workbuddy_version_when_available
      - reproducible_steps
      - result_or_screenshot
      - failure_and_correction_notes
  source-verified:
    label: "B：来源核对"
    requirements:
      - official_source
      - explicit_not_tested_notice
      - version_sensitive_claims_marked
      - community_claims_separated_from_official_facts
  automated-draft:
    label: "C：自动草稿"
    requirements:
      - status_draft
      - research_pack
      - visual_plan
      - human_review_before_publish

required_front_matter:
  - title
  - description
  - category
  - difficulty
  - created_at
  - updated_at
  - verification
  - status
  - sources

recommended_front_matter:
  - estimated_time
  - recommended_mode
  - recommended_model
  - required_skills
  - required_connectors
  - visual_assets
  - research_pack

allowed_statuses:
  - published
  - needs-review
  - draft
  - outdated

allowed_categories:
  - getting-started
  - office
  - automation
  - skills
  - troubleshooting

publishing_rules:
  docs_directory:
    forbidden_verification:
      - automated-draft
    forbidden_status:
      - draft
  drafts_directory:
    required_status:
      - draft
  automatic_merge: false
  automatic_publication: false
  max_new_guides_per_week: 2
  max_guides_per_pull_request: 2

source_rules:
  collect_existing_sources_before_writing: true
  official_source_required_for_source_verified: true
  search_snippet_is_discovery_only: true
  community_source_requires_fact_check: true
  community_source_cannot_prove:
    - official_support
    - exact_pricing
    - exact_credit_limits
    - current_model_availability
    - security_guarantees
  source_registry_required: sources/community-tutorials.yaml
  coverage_matrix_required: content/coverage-matrix.yaml

source_priority:
  - official_documentation
  - official_faq
  - official_release_notes
  - official_practice_case
  - first_party_demo
  - reproducible_community_tutorial
  - community_discussion
  - search_snippet

visual_rules:
  standard_file: docs/standards/visual-tutorial-standard.md
  p0_minimum_assets: 2
  p0_recommended_assets: 4
  allowed:
    - project_test_screenshot
    - original_svg
    - authorized_official_image
    - clearly_labeled_example_result
  forbidden:
    - fabricated_workbuddy_ui
    - unlicensed_third_party_tutorial_image
    - screenshot_with_secrets
    - screenshot_with_unredacted_personal_or_business_data
  screenshot_requirements:
    - platform
    - capture_date
    - workbuddy_version_when_available
    - redaction_review

required_tutorial_sections:
  - problem_and_outcome
  - audience_and_limitations
  - preparation
  - mode_model_skill_workspace_permissions
  - step_by_step_instructions
  - copyable_prompt
  - success_markers
  - result_validation
  - troubleshooting
  - rollback_and_recovery
  - privacy_security_and_data_flow
  - sources
  - update_history

high_risk_topics:
  - deleting_files
  - moving_or_renaming_many_files
  - overwriting_files
  - full_access
  - running_scripts
  - installing_software
  - external_network_access
  - sending_messages
  - publishing_content
  - payment
  - account_security
  - personal_data
  - customer_data
  - legal_or_employment_decisions

high_risk_requirements:
  - use_copies_or_backups
  - explain_impact_scope
  - require_human_confirmation
  - provide_rollback_or_recovery
  - record_changes

forbidden_claims_without_evidence:
  - "亲测有效"
  - "百分之百成功"
  - "完全安全"
  - "不会泄露"
  - "完全离线"
  - "官方推荐"
  - "永远不会出错"

forbidden_public_content:
  - secrets
  - tokens
  - cookies
  - oauth_callback_links
  - qr_codes_containing_authentication
  - raw_logs
  - customer_identity
  - order_numbers
  - production_database_credentials
  - copyrighted_full_text
  - unredacted_resumes
  - payroll_or_bank_information

staleness_rules:
  prices_credits_and_limits_days: 7
  models_skills_and_connectors_days: 14
  ui_and_navigation_days: 30
  permissions_and_security_days: 30
  stable_workflow_principles_days: 90
