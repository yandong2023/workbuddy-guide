collection_policy:
  save:
    - title
    - url
    - source_type
    - author
    - published_at
    - discovered_at
    - short_summary
    - relevant_claims
  do_not_save:
    - full_paywalled_article
    - full_video_transcript
    - personal_information
    - authentication_data
