status_values:
  published: 完整教程已发布
  needs_upgrade: 已有教程但需补图或补实测
  sourced: 已有可靠来源，待研究写作
  planned: 已进入目录，等待来源和实测
  blocked: 信息冲突或当前无法验证

priority_values:
  P0: 最高频、最能帮助普通用户
