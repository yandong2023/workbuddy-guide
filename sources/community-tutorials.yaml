research_workflow:
  discover:
    - search_new_articles_from_last_7_days
    - check_official_docs_and_release_notes
    - review_open_issues_and_user_questions
  extract:
    - title
    - url
    - author
    - publish_date
    - scenarios
    - unique_steps
    - screenshots_present
    - user_failures
    - claims_needing_verification
  synthesize:
    - compare_with_official_docs
    - find_missing_steps
    - design_safer_workflow
    - write_original_tutorial
    - create_original_diagrams_or_redacted_screenshots
  publish:
    - source_verified_first
    - draft_pull_request
    - human_review
    - upgrade_to_tested_after_reproduction
