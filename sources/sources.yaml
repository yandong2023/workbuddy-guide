collection_policy:
  save:
    - title
    - url
    - source_type
    - author
    - publisher
    - published_at
    - updated_at
    - discovered_at
    - short_summary
    - scenarios
    - unique_steps
    - screenshots_present
    - user_failures
    - relevant_claims
    - claims_needing_verification
  do_not_save:
    - full_paywalled_article
    - full_video_transcript
    - copyrighted_full_text
    - personal_information
    - authentication_data

review_policy:
  official_source:
    use_for: [feature_facts, navigation, permissions, supported_integrations]
    still_requires_version_check: true
  community_source:
    use_for: [workflow_ideas, failures, prompts, user_language, content_gaps]
    cannot_prove: [official_support, security, exact_limits, pricing, model_availability]
  search_snippet:
    use_for: [discover_url]
    cannot_be_cited_as_final_evidence: true
