name: Weekly Source Audit

on:
  schedule:
    - cron: "0 1 * * 1" # Monday 09:00 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check source links
        id: audit
        run: |
          set +e
          python scripts/check_sources.py > source-audit.md
          status=$?
          set -e
          cat source-audit.md
          cat source-audit.md >> "$GITHUB_STEP_SUMMARY"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Fail on confirmed broken links
        if: steps.audit.outputs.exit_code != '0'
        run: |
          echo "发现明确返回 404/410 的来源链接，请人工检查并更新 sources/。"
          exit 1
