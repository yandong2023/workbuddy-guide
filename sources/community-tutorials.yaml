version: 1
updated_at: "2026-07-17"

purpose: >-
  收集可用于发现选题、核对功能和了解真实问题的公开教程。
  本文件只保存元数据、主题和研究价值，不保存全文，不允许直接搬运或近似改写。

source_rules:
  - official_sources_are_primary_for_product_facts
  - community_sources_are_for_workflows_failures_and_content_gaps
  - do_not_copy_full_text_or_video_transcripts
  - every_claim_must_be_rechecked_against_current_product
  - community_claims_about_price_credits_models_and_limits_are_time_sensitive
  - preserve_original_url_author_and_publish_date
  - conflicts_require_human_review

